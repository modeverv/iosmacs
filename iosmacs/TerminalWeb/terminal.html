<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <link rel="stylesheet" href="vendor/xterm/xterm.css">
  <style>
    html,
    body,
    #terminal {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    body {
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    #terminal {
      box-sizing: border-box;
      padding: 0;
      --iosmacs-terminal-font-size: 15px;
    }

    .xterm {
      height: 100%;
      font-family: "Menlo", "SF Mono", "Hiragino Sans", "Hiragino Kaku Gothic ProN", monospace, sans-serif;
      font-weight: 400;
      letter-spacing: 0;
    }

    .xterm .xterm-helper-textarea {
      position: fixed !important;
      top: -100px !important;
      left: -100px !important;
      width: 1px !important;
      height: 1px !important;
      min-width: 1px !important;
      min-height: 1px !important;
      max-width: 1px !important;
      max-height: 1px !important;
      opacity: 0 !important;
      color: transparent !important;
      background: transparent !important;
      -webkit-text-fill-color: transparent !important;
      caret-color: transparent !important;
      box-shadow: none !important;
      outline: none !important;
      resize: none !important;
    }

    .xterm .composition-view {
      display: none !important;
    }

    #ime-proxy {
      position: fixed;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      min-width: 1px;
      min-height: 1px;
      opacity: 0.01;
      color: transparent;
      background: transparent;
      -webkit-text-fill-color: transparent;
      caret-color: transparent;
      border: 0;
      box-shadow: none;
      outline: none;
      resize: none;
      pointer-events: none;
      z-index: 1;
    }

    #ime-composition {
      position: fixed;
      left: 0;
      top: 0;
      display: none;
      min-width: 1ch;
      min-height: 1em;
      padding: 0 1px;
      color: #f5f5f5;
      background: rgba(245, 245, 245, 0.12);
      border-bottom: 1px solid #f5f5f5;
      font-family: "Menlo", "SF Mono", "Hiragino Sans", "Hiragino Kaku Gothic ProN", monospace, sans-serif;
      font-size: var(--iosmacs-terminal-font-size);
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: 0;
      white-space: pre;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <textarea id="ime-proxy" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
  <div id="ime-composition"></div>
  <script src="vendor/xterm/xterm.js"></script>
  <script src="vendor/xterm-addon-fit/addon-fit.js"></script>
  <script src="iosmacs-terminal.js"></script>
</body>
</html>
